<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Restaurant Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  :root {
    --bg: #121212;
    --surface: #1e1e1e;
    --surface2: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #999;
    --accent: #f0a030;
    --accent-hover: #ffb847;
    --maps-green: #34a853;
    --maps-green-hover: #2d9249;
    --border: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  #map {
    width: 100%;
    height: 55vh;
    min-height: 300px;
    position: relative;
    z-index: 2;
  }

  .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1); }
  .leaflet-control-attribution { background: var(--surface) !important; color: var(--text-dim) !important; font-size: 10px !important; }
  .leaflet-control-attribution a { color: var(--text-dim) !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-radius: 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
  .leaflet-popup-close-button { color: var(--text-dim) !important; font-size: 20px !important; top: 6px !important; right: 8px !important; }
  .leaflet-popup-close-button:hover { color: var(--text) !important; }

  .popup-inner {
    padding: 14px 16px;
  }
  .popup-inner .popup-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
    padding-right: 16px;
  }
  .popup-inner .popup-cuisine {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .popup-inner .popup-address {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .popup-inner .popup-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .popup-inner .popup-rating {
    color: var(--accent);
    font-weight: 600;
  }
  .rating-na {
    color: var(--text-dim) !important;
    font-weight: 400 !important;
    font-style: italic;
    font-size: 11px;
  }
  .popup-inner .popup-hours {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .popup-inner .popup-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.4;
    font-style: italic;
  }
  .gmaps-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--maps-green);
    color: #fff;
    text-align: center;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .gmaps-btn:hover { background: var(--maps-green-hover); }
  .gmaps-btn::before { content: '\1F4CD '; }

  .search-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
  }
  .search-input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .filter-label {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: center;
    padding-right: 4px;
  }
  .clear-filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: none;
  }
  .clear-filters-bar.visible { display: block; }
  .clear-filters-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .clear-filters-btn:hover { border-color: var(--accent); color: var(--text); }

  .sort-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
  }
  .sort-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--text); }
  .sort-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .list-header {
    padding: 16px 16px 8px;
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .restaurant-list {
    padding: 0 16px 80px;
  }

  .restaurant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .restaurant-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(240, 160, 48, 0.15); }
  .restaurant-card:active { background: var(--surface2); }
  .restaurant-card.card-unmappable { cursor: default; }
  .restaurant-card.card-unmappable:hover { border-color: var(--border); box-shadow: none; }
  .restaurant-card.card-unmappable:active { background: var(--surface); }
  .card-address-tbd {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px dashed var(--border);
  }

  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    grid-column: 1 / -1;
  }
  .empty-state-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .card-rating {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-left: 8px;
    white-space: nowrap;
  }
  .card-details {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .card-neighborhood {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    margin-right: 6px;
  }
  .card-cuisine {
    font-size: 12px;
    color: var(--text-dim);
  }
  .card-hours {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
  }
  .card-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
    font-style: italic;
  }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .card-source {
    font-size: 11px;
    color: var(--text-dim);
  }
  .card-gmaps {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--maps-green);
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .card-gmaps:hover { background: var(--maps-green-hover); }

  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    vertical-align: middle;
  }
  .status-upcoming { background: rgba(240, 160, 48, 0.15); color: #f0a030; }
  .status-temporary { background: rgba(230, 140, 20, 0.15); color: #e68c14; }
  .status-closed { background: rgba(180, 60, 60, 0.15); color: #b43c3c; }

  @media (min-width: 768px) {
    #map { height: 60vh; }
    .restaurant-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .restaurant-card { margin-bottom: 0; }
  }
  @media (min-width: 1200px) {
    .restaurant-list {
      grid-template-columns: repeat(3, 1fr);
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }
    .list-header, header, .search-bar, .filter-bar, .clear-filters-bar, .sort-bar {
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }
  }
</style>
</head>
<body>

<header>
  <h1>NYC Restaurants</h1>
  <div class="subtitle" id="count"></div>
</header>

<div id="map"></div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="search" type="text" placeholder="Search by name, cuisine, neighborhood, address, or note...">
  </div>
</div>
<div class="filter-bar" id="filters"><span class="filter-label">Area</span></div>
<div class="filter-bar" id="cuisine-filters"><span class="filter-label">Cuisine</span></div>
<div class="clear-filters-bar" id="clear-bar"><button class="clear-filters-btn" id="clear-btn">Clear filters</button></div>

<div class="sort-bar" id="sort-bar">
  <span class="filter-label">Sort</span>
  <button class="sort-btn active" data-sort="date">Newest</button>
  <button class="sort-btn" data-sort="rating">Rating</button>
  <button class="sort-btn" data-sort="alpha">A&ndash;Z</button>
  <button class="sort-btn" data-sort="neighborhood">Neighborhood</button>
</div>

<div class="list-header" id="list-header">All Restaurants</div>
<div class="restaurant-list" id="list"></div>

<script>
