e A, New York, NY 10009","place_id":null,"lat":40.7237,"lng":-73.9846,"neighborhood":"East Village","cuisine":"Coffee, Sweets","source":"EV Grieve — Openings: Lucky Cafe on Avenue A (Apr 2026)","added":"2026-05-07","note":"Coffee and matcha shop on Avenue A from East Village locals James Phillips and barista Max Vitkus. Pastries from Brooklyn's Colson Patisserie. Open daily 8am–6pm."},  {"name":"Silk Noodle Bar","address":"13 Mott St, New York, NY 10013","place_id":null,"lat":40.714,"lng":-73.9982,"neighborhood":"Chinatown","cuisine":"Chinese","source":"The Infatuation / Welcome to Chinatown (Spring 2026)","added":"2026-05-07","note":"Specialist for luosifen — Liuzhou river-snail rice noodle soup from Guangxi — bold, sour, spicy, with fermented bamboo shoots. Bowls $14–$20. Often packed; expect a wait."},  {"name":"Wallace","address":"663 Vanderbilt Ave, Brooklyn, NY 11238","place_id":null,"lat":40.677,"lng":-73.9688,"neighborhood":"Prospect Heights","cuisine":"Wine Bar","source":"The Infatuation — Wallace review (May 2026)","added":"2026-05-10","note":"Neighborhood wine bar on Vanderbilt Ave with backyard seating, an extensive by-the-glass program, and a small food menu featuring gildas, oysters, and martinis. Just walking distance from Prospect Park."},  {"name":"Tavern Next Door","address":"327 Van Brunt St, Brooklyn, NY 11231","place_id":null,"lat":40.6779,"lng":-74.012,"neighborhood":"Red Hook","cuisine":"Bar, American","source":"The Infatuation — Tavern Next Door review (May 2026)","added":"2026-05-10","note":"Walk-in cocktail bar from the Red Hook Tavern team, located right next door. Small food menu including a version of the famous dry-aged tavern burger. Reservation-friendly overflow option for the perpetually booked flagship."},  {"name":"Kinda Nice","address":"168 Borinquen Pl, Brooklyn, NY 11211","place_id":null,"lat":40.7106,"lng":-73.9533,"neighborhood":"Williamsburg","cuisine":"Cocktail Bar","source":"Greenpointers / The Infatuation (May 2026)","added":"2026-05-10","note":"Cocktail bar that opened May 7, 2026 in the former Black Flamingo space. Owners Patty Dennison and Ally Marrone (ex-bartenders) lean into nostalgic Americana — Guava Negroni, Greek Salad Martini, banana Old Fashioned, deviled eggs, grilled cheese. Open daily 5pm–midnight."},  {"name":"Café Bar J.F.","address":"50 Withers St, Brooklyn, NY 11211","place_id":null,"lat":40.718,"lng":-73.9498,"neighborhood":"Williamsburg","cuisine":"South American","source":"Greenpointers / Resy — Café Bar J.F. opens (May 13, 2026)","added":"2026-05-15","note":"South American tavern that opened May 13, 2026 in the former Llama Inn space. From Llama Group's Juan Correa with Chef Francisco Castillo (ex-Llama San). Nostalgia-driven menu drawing on Peru, Chile, and Argentina; South American cocktails from Sarah Morrissey; wine program by Pierre Buffet. Dinner Wed–Sun."},  {"name":"Zoli","address":"312 Maujer St, Brooklyn, NY 11206","place_id":null,"lat":40.71,"lng":-73.9396,"neighborhood":"Williamsburg","cuisine":"Seafood, American","source":"Greenpointers / The Infatuation — Zoli opens at Amant (May 2026)","added":"2026-05-15","note":"Seafood-forward American restaurant from chef Ned Baldwin (Houseman) that opened in early May 2026 inside the Amant arts foundation. 35-seat dining room and 18-seat bar separated by Pierre Huyghe's 'Satellite' aquarium triptych. Menu flips the usual ratio — fish leads, other proteins secondary."},  {"name":"Lonnies","address":"112 Bond St, Brooklyn, NY 11217","place_id":null,"lat":40.6857,"lng":-73.9866,"neighborhood":"Boerum Hill","cuisine":"American","source":"Cobble Hill Collective / Resy / Infatuation — Lonnies opens (May 20, 2026)","added":"2026-05-20","note":"Diner-inspired neighborhood spot from Sean Rembold and Caron Callahan (Ingas Bar) that opened May 20, 2026 at 112 Bond at Pacific. Lo-fi, approachable menu: daily prime rib, chicken under a brick, burger with locally butchered beef. Cozy classic-diner aesthetic. Named for Lon function cuisineCategory(cuisine) {
  const c = (cuisine || '').toLowerCase();
  // Specific Asian cuisines come first so compound names like
  // "Korean Steakhouse", "Korean-Italian", "Vietnamese-Mexican Fusion",
  // and "French-Vietnamese" don't get swallowed by broader categories below.
  if (c.includes('vietnamese')) return 'Vietnamese';
  if (c.includes('korean')) return 'Korean';
  if (c.includes('mexican')) return 'Mexican';
  if (c.includes('chinese') || c.includes('cantonese') || c.includes('dim sum') || c.includes('shanghainese') || c.includes('dongbei')) return 'Chinese';
  if (c.includes('french') || c.includes('bistro')) return 'French';
  if (c.includes('indian')) return 'Indian';
  if (c.includes('coffee') || c.includes('ice cream') || c.includes('frozen yogurt') || c.includes('acai') || c.includes('smoothie') || c.includes('gelato') || c.includes('dessert')) return 'Coffee & Sweets';
  // American — includes diner-adjacent and rotisserie spots that don't fit a
  // tighter regional bucket. "Jewish deli" lands here because the menu vocab
  // (pastrami, matzo ball, knish) is closer to NY-American comfort than any
  // standalone category would justify at this dataset size.
  if (c.includes('american') || c === 'steakhouse' || c.includes('burgers') || c.includes('southern') || c.includes('sandwich') || c.includes('deli') || c.includes('rotisserie')) return 'American';
  if (c.includes('mediterranean') || c.includes('israeli') || c.includes('persian') || c.includes('greek') || c.includes('falafel')) return 'Mediterranean';
  if (c.includes('seafood') || c.includes('oyster')) return 'Seafood';
  if (c.includes('japanese') || c === 'nikkei' || c.includes('omakase') || c.includes('sushi') || c.includes('izakaya')) return 'Japanese';
  if (c.includes('caribbean')) return 'Caribbean';
  if (c.includes('italian')) return 'Italian';
  if (c.includes('thai')) return 'Thai';
  if (c.includes('tibetan') || c.includes('malaysian') || c.includes('hong kong') || c.includes('taiwanese') || c.includes('filipino') || c.includes('singaporean')) return 'Asian';
  // Dining-mode buckets \u2014 surface tasting menus and wild-to-table as their own
  // filters before falling through to bar/cafe defaults.
  if (c.includes('tasting')) return 'Tasting Menu';
  if (c.includes('wild')) return 'Wild-to-Table';
  if (c.includes('speakeasy') || c.includes('cafe') || c.includes('caf\u00e9') || c.includes('bar') || c.includes('wine')) return 'Cafe & Bar';
  if (c.includes('bakery') || c.includes('bagel')) return 'Bakery';
  if (c.includes('pizza')) return 'Pizza';
  return 'Other';
}

function getStatus(r) {
  if (CLOSED.has(r.name)) return {label: 'Closed', cls: 'closed'};

  if (TEMPORARY.has(r.name)) return {label: 'Pop-Up', cls: 'temporary'};

}

// Highlight entries added within the last RECENT_WINDOW_MS so visitors can
// spot fresh scout-cycle additions at a glance regardless of which sort or
// filter they have active. Orthogonal to getStatus(): a place can be both
// Pop-Up and NEW, etc.
const RECENT_WINDOW_MS = 7 * 24 * 60 * 60 * 1000;
const NOW_MS = Date.now();
function isRecentlyAdded(r) {
  const t = addedScore(r.added);
  return t > 0 && (NOW_MS - t) <= RECENT_WINDOW_MS;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function gmapsUrl(r) {
  if (r.lat == null || r.lng == null) return '#';
  const base = `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
  return r.place_id ? base + `&query_place_id=${r.place_id}` : base;
}

function formatAdded(d) {
  if (!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = d.split('-');
  const month = months[parseInt(parts[1], 10) - 1];
  if (parts[2]) return 'Added ' + month + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
  return 'Added ' + month + ' ' + parts[0];
}

// Fan out markers that share a location so overlapping pins stay individually
// clickable. Real coordinates (r.lat / r.lng) are kept untouched for popups
// and Google Maps links; only displayLat / displayLng are nudged.
(function spreadOverlappingMarkers() {
  const COLLISION_RADIUS_M = 40;   // group markers within this radius — wide enough
                                   // to catch same-building neighbors that Google
                                   // geocodes 30+ m apart (e.g. Mariscos El Submarino
                                   // upstairs from Vato at 226 7th Ave).
  const FAN_RADIUS_M = 18;         // distance from cluster center for each pin —
                                   // gives ~36 m of separation, larger than the
                                   // 28-px pin icon at typical city zoom.
  const R = 6371000;
  function metersBetween(a, b) {
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const x = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(x));
  }
  const assigned = new Set();
  const groups = [];
  for (let i = 0; i < mappable.length; i++) {
    if (assigned.has(i)) continue;
    const group = [i];
    assigned.add(i);
    for (let j = i + 1; j < mappable.length; j++) {
      if (assigned.has(j)) continue;
      if (metersBetween(mappable[i], mappable[j]) <= COLLISION_RADIUS_M) {
        group.push(j);
        assigned.add(j);
      }
    }
    if (group.length > 1) groups.push(group);
  }
  groups.forEach(group => {
    const centerLat = group.reduce((s, i) => s + mappable[i].lat, 0) / group.length;
    const centerLng = group.reduce((s, i) => s + mappable[i].lng, 0) / group.length;
    const mPerDegLat = 111320;
    const mPerDegLng = 111320 * Math.cos(centerLat * Math.PI / 180);
    group.forEach((idx, k) => {
      const angle = (2 * Math.PI * k) / group.length - Math.PI / 2;
      mappable[idx].displayLat = centerLat + (FAN_RADIUS_M * Math.sin(angle)) / mPerDegLat;
      mappable[idx].displayLng = centerLng + (FAN_RADIUS_M * Math.cos(angle)) / mPerDegLng;
    });
  });
  mappable.forEach(r => {
    if (r.displayLat == null) { r.displayLat = r.lat; r.displayLng = r.lng; }
  });
})();

// Compute initial bounds from the inner percentile range of marker coordinates
// so a handful of outliers (e.g. Astoria, Elmhurst, Upper East Side) don't pull
// the default view away from where 90% of the data actually lives
// (Brooklyn + Lower / East Manhattan). Every marker still renders — users can
// pan to outliers — but the opening framing is tight on the dense core.
function percentileBounds(points, pct) {
  if (points.length === 0) return null;
  const lats = points.map(p => p[0]).sort((a, b) => a - b);
  const lngs = points.map(p => p[1]).sort((a, b) => a - b);
  const lo = Math.floor(lats.length * pct);
  const hi = Math.ceil(lats.length * (1 - pct)) - 1;
  return L.latLngBounds(
    [lats[lo], lngs[lo]],
    [lats[Math.max(hi, lo)], lngs[Math.max(hi, lo)]]
  );
}

function sortList(list) {
  const sorted = list.slice();
  switch (activeSort) {
    case 'alpha':
      sorted.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'neighborhood':
      sorted.sort((a, b) => a.neighborhood.localeCompare(b.neighborhood) || a.name.localeCompare(b.name));
      break;
    default:
      sorted.sort((a, b) => addedScore(b.added) - addedScore(a.added));
  }
  return sorted;
}

function renderList(filtered) {
  let label = 'All Restaurants';
  if (activeFilter !== 'all' && activeCuisineFilter !== 'all') {
    label = activeCuisineFilter + ' in ' + activeFilter;
  } else if (activeFilter !== 'all') {
    label = activeFilter;
  } else if (activeCuisineFilter !== 'all') {
    label = activeCuisineFilter;
  }
  listHeader.textContent = `${label} (${filtered.length})`;
  countEl.textContent = `${deduped.length} spots across NYC`;

  const visibleKeys = new Set(filtered.filter(r => r.lat != null).map(r => r.name + r.address));
  Object.entries(markers).forEach(([key, marker]) => {
    if (visibleKeys.has(key)) { marker.addTo(map); }
    else { marker.remove(); }
  });

  const visibleCoords = filtered.filter(r => r.lat != null && r.lng != null);
  const visibleKey = visibleCoords.map(r => r.name).join('|');
  if (visibleKey !== prevVisibleKey && !isInitialRender) {
    if (visibleCoords.length === 1) {
      const r0 = visibleCoords[0];
      map.flyTo([r0.displayLat ?? r0.lat, r0.displayLng ?? r0.lng], 16, { duration: 0.6 });
    } else if (visibleCoords.length > 1) {
      map.flyToBounds(L.latLngBounds(visibleCoords.map(r => [r.displayLat ?? r.lat, r.displayLng ?? r.lng])), { padding: [30, 30], maxZoom: 16, duration: 0.6 });
    }
  }
  prevVisibleKey = visibleKey;
  isInitialRender = false;

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="empty-state-title">No restaurants found</div>
      <div>Try adjusting your search or filters</div>
    </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const st = getStatus(r);
    const stHtml = st ? `<span class="status-badge status-${st.cls}">${st.label}</span>` : '';
    const newHtml = isRecentlyAdded(r) ? '<span class="status-badge status-new">New</span>' : '';
    const hasCoords = r.lat != null && r.lng != null;
    // Mappable cards behave like buttons (Enter / Space → fly to pin).
    // Unmappable cards are static — render as plain divs with no tab stop so
    // keyboard users don't land on a non-interactive element.
    const a11yAttrs = hasCoords
      ? `role="button" tabindex="0" aria-label="${escapeHtml(r.name)}, ${escapeHtml(r.neighborhood)} — show on map"`
      : '';
    return `
    <div class="restaurant-card${hasCoords ? '' : ' card-unmappable'}" data-key="${escapeHtml(r.name)}${escapeHtml(r.address || '')}" ${a11yAttrs}>
      <div class="card-top">
        <div class="card-name">${escapeHtml(r.name)}</div>
      </div>
      <div class="card-details">
        ${newHtml}
        ${stHtml}
        <span class="card-neighborhood">${escapeHtml(r.neighborhood)}</span>
        <span class="card-cuisine">${escapeHtml(r.cuisine)}</span>
      </div>
      <div class="card-details">${r.address ? escapeHtml(r.address) : '<span class="card-address-tbd">Address TBD</span>'}</div>
      ${r.hours ? `<div class="card-hours">${escapeHtml(r.hours)}</div>` : ''}
      ${r.note ? `<div class="card-note">${escapeHtml(r.note)}</div>` : ''}
      <div class="card-bottom">
        <span class="card-source">${r.source ? escapeHtml(r.source) : ''}${r.source && r.added ? ' \u00b7 ' : ''}${r.added ? formatAdded(r.added) : ''}</span>
        ${hasCoords ? `<a class="card-gmaps" href="${gmapsUrl(r)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Google Maps</a>` : ''}
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.restaurant-card').forEach(card => {
    const activate = () => {
      const key = card.dataset.key;
      const marker = markers[key];
      if (marker) {
        map.flyTo(marker.getLatLng(), 16, { duration: 0.8 });
        marker.openPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };
    card.addEventListener('click', activate);
    // Keyboard activation for role=button cards. Space scrolls by default, so
    // preventDefault() is required to keep it from also paging the list down.
    card.addEventListener('keydown', e => {
      if (card.getAttribute('role') !== 'button') return;
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        activate();
      }
    });
  });
}

function updateClearButton() {
  const hasFilters = activeFilter !== 'all' || activeCuisineFilter !== 'all' || searchInput.value.trim() !== '';
  clearBar.classList.toggle('visible', hasFilters);
}

function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  let filtered = activeFilter === 'all' ? deduped : deduped.filter(r => r.neighborhood === activeFilter);
  if (activeCuisineFilter !== 'all') {
    filtered = filtered.filter(r => r.cuisineCat === activeCuisineFilter);
  }
  if (query) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(query) ||
      (r.cuisine && r.cuisine.toLowerCase().includes(query)) ||
      r.neighborhood.toLowerCase().includes(query) ||
      (r.note && r.note.toLowerCase().includes(query)) ||
      (r.address && r.address.toLowerCase().includes(query))
    );
  }
  renderList(sortList(filtered));
  updateClearButton();
}

applyFilters();
</script>
</body>
</html>
