<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Restaurant Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
  :root {
    --bg: #121212;
    --surface: #1e1e1e;
    --surface2: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #999;
    --accent: #f0a030;
    --accent-hover: #ffb847;
    --maps-green: #34a853;
    --maps-green-hover: #2d9249;
    --border: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  #map {
    width: 100%;
    height: 55vh;
    min-height: 300px;
    position: relative;
    z-index: 2;
  }

  /* Dark map tiles */
  .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1); }
  .leaflet-control-attribution { background: var(--surface) !important; color: var(--text-dim) !important; font-size: 10px !important; }
  .leaflet-control-attribution a { color: var(--text-dim) !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

  /* Custom popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-radius: 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
  .leaflet-popup-close-button { color: var(--text-dim) !important; font-size: 20px !important; top: 6px !important; right: 8px !important; }
  .leaflet-popup-close-button:hover { color: var(--text) !important; }

  .popup-inner {
    padding: 14px 16px;
  }
  .popup-inner .popup-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
    padding-right: 16px;
  }
  .popup-inner .popup-cuisine {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .popup-inner .popup-address {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .popup-inner .popup-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .popup-inner .popup-rating {
    color: var(--accent);
    font-weight: 600;
  }
  .popup-inner .popup-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.4;
    font-style: italic;
  }
  .gmaps-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--maps-green);
    color: #fff;
    text-align: center;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .gmaps-btn:hover { background: var(--maps-green-hover); }
  .gmaps-btn::before { content: '\1F4CD '; }

  /* Search bar */
  .search-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
  }
  .search-input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  /* Filter bar */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .filter-label {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: center;
    padding-right: 4px;
  }
  .clear-filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: none;
  }
  .clear-filters-bar.visible { display: block; }
  .clear-filters-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .clear-filters-btn:hover { border-color: var(--accent); color: var(--text); }

  /* List view */
  .list-header {
    padding: 16px 16px 8px;
    font-size: 14px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .restaurant-list {
    padding: 0 16px 80px;
  }

  .restaurant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .restaurant-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(240, 160, 48, 0.15); }
  .restaurant-card:active { background: var(--surface2); }

  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
  }
  .empty-state-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .card-rating {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-left: 8px;
    white-space: nowrap;
  }
  .card-details {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .card-neighborhood {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    margin-right: 6px;
  }
  .card-cuisine {
    font-size: 12px;
    color: var(--text-dim);
  }
  .card-note {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
    font-style: italic;
  }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .card-source {
    font-size: 11px;
    color: var(--text-dim);
  }
  .card-gmaps {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--maps-green);
    color: #fff;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .card-gmaps:hover { background: var(--maps-green-hover); }

  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    vertical-align: middle;
  }
  .status-open { background: rgba(52, 168, 83, 0.15); color: #34a853; }
  .status-closed { background: rgba(234, 67, 53, 0.15); color: #ea4335; }
  .status-upcoming { background: rgba(240, 160, 48, 0.15); color: #f0a030; }

  @media (min-width: 768px) {
    #map { height: 60vh; }
    .restaurant-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .restaurant-card { margin-bottom: 0; }
  }
  @media (min-width: 1200px) {
    .restaurant-list {
      grid-template-columns: repeat(3, 1fr);
      max-width: 1200px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }
    .list-header, header, .search-bar, .filter-bar, .clear-filters-bar {
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }
  }
</style>
</head>
<body>

<header>
  <h1>NYC Restaurants</h1>
  <div class="subtitle" id="count"></div>
</header>

<div id="map"></div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="search" type="text" placeholder="Search by name, cuisine, neighborhood, or note...">
  </div>
</div>
<div class="filter-bar" id="filters"><span class="filter-label">Area</span></div>
<div class="filter-bar" id="cuisine-filters"><span class="filter-label">Cuisine</span></div>
<div class="clear-filters-bar" id="clear-bar"><button class="clear-filters-btn" id="clear-btn">Clear filters</button></div>

<div class="list-header" id="list-header">All Restaurants</div>
<div class="restaurant-list" id="list"></div>

<script>
// Load restaurant data dynamically from restaurants.json
let restaurants = [];

fetch('restaurants.json')
  .then(response => response.json())
  .then(data => {
    restaurants = data;
    initializeApp();
  })
  .catch(error => {
    console.error('Failed to load restaurant data:', error);
    document.getElementById('list').innerHTML = '<div class="empty-state"><div class="empty-state-title">Error loading data</div><div>Could not load restaurant data. Please refresh the page.</div></div>';
  });

// Deduplicate by name+address
const seen = new Set();
restaurants = restaurants.filter(r => {
  const key = r.name + '|' + r.address;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

// Sort by added date descending
function addedScore(d) {
  if (!d) return 0;
  if (d.length === 10) return Date.parse(d);          // 2026-04-01
  if (d.length === 7) return Date.parse(d + '-01');    // 2026-03
  return 0;
}
restaurants.sort((a, b) => addedScore(b.added) - addedScore(a.added));

// Hours data — null means upcoming / not yet open
const HOURS = {
  "Bánh Anh Em": "Mon-Sun 11:30-22:00",
  "Sixty Three Clinton": "Tue-Sat 17:00-23:00",
  "Estela": "Mon-Sun 17:30-23:00",
  "Bridges": "Mon-Sun 11:00-22:00",
  "Sunn's": "Wed-Mon 12:00-22:00",
  "Gazab": "Tue-Sun 17:00-22:30",
  "Golden Steer at One Fifth": "Tue-Sat 17:00-23:00",
  "Stars": "Tue-Sun 17:00-23:00",
  "Odo East Village": "Wed-Sun 17:00-22:00",
  "Cô Lạc": "Tue-Sat 17:00-22:00",
  "TBD Gimbap": "Wed-Sun 11:00-15:00",
  "Beto's Carnitas & Guisados": "Tue-Sun 11:00-20:00",
  "Bar Chucho": "Tue-Sun 16:00-0:00",
  "Strange Delight": "Tue-Sun 16:00-23:00",
  "FOLK": "Tue-Sun 17:00-22:30",
  "Alma Negra": "Mon-Sun 12:00-22:00",
  "Le Fleur Rouge": "Tue-Sat 17:00-22:00",
  "Sailor": "Tue-Sun 17:00-23:00",
  "Third Falcon": "Tue-Sat 17:30-22:30",
  "Evelina": "Tue-Sun 17:00-22:30",
  "Miss Ada": "Tue-Sun 17:30-22:30",
  "GERTIE": "Mon-Sun 8:00-16:00",
  "Leland Eating and Drinking House": "Tue-Sun 17:00-23:00",
  "Sofreh": "Tue-Sun 17:00-22:00",
  "Cafe Mado": "Wed-Sun 10:00-22:00",
  "Zimmi's": "Tue-Sat 17:30-23:00",
  "Lei": "Tue-Sun 17:00-0:00",
  "Kabawa": "Wed-Sun 17:00-22:00",
  "DOLORES": "Tue-Sun 11:00-22:00",
  "Entre Nous": "Tue-Sun 16:00-23:00"
};
restaurants.forEach(r => { r.hours = HOURS[r.name] ?? null; });

// Status detection based on general operating status (not current time)
function getStatus(r) {
  if (r.closed) return {label: 'Closed', cls: 'closed'};
  if (r.hours) return {label: 'Open', cls: 'open'};
  return {label: 'Coming Soon', cls: 'upcoming'};
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function gmapsUrl(r) {
  const base = `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
  return r.place_id ? base + `&query_place_id=${r.place_id}` : base;
}

function formatSource(s) {
  return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function cuisineCategory(cuisine) {
  const c = (cuisine || '').toLowerCase();
  if (c.includes('mexican')) return 'Mexican';
  if (c.includes('chinese')) return 'Chinese';
  if (c.includes('french')) return 'French';
  if (c.includes('vietnamese')) return 'Vietnamese';
  if (c.includes('indian')) return 'Indian';
  if (c.includes('american') || c === 'steakhouse' || c === 'burgers' || c.includes('southern')) return 'American';
  if (c.includes('mediterranean') || c.includes('israeli') || c.includes('persian')) return 'Mediterranean';
  if (c.includes('seafood') || c.includes('oyster')) return 'Seafood';
  if (c.includes('japanese') || c === 'nikkei') return 'Japanese';
  if (c.includes('caribbean')) return 'Caribbean';
  if (c.includes('italian')) return 'Italian';
  if (c.includes('korean')) return 'Korean';
  if (c.includes('thai')) return 'Thai';
  if (c.includes('cafe') || c.includes('bar') || c.includes('wine')) return 'Cafe & Bar';
  if (c.includes('pizza')) return 'Pizza';
  return 'Other';
}
restaurants.forEach(r => { r.cuisineCat = cuisineCategory(r.cuisine); });

function starDisplay(rating) {
  if (rating == null) return '';
  return '\u2605 ' + rating.toFixed(1);
}

// --- MAP ---
const bounds = L.latLngBounds(restaurants.map(r => [r.lat, r.lng]));
const map = L.map('map', { zoomControl: true }).fitBounds(bounds, { padding: [30, 30] });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const pinIcon = L.divIcon({
  className: '',
  html: '<div style="width:28px;height:28px;background:#f0a030;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:14px;">&#127860;</div>',
  iconSize: [28, 28],
  iconAnchor: [14, 14],
  popupAnchor: [0, -16]
});

const markers = {};
restaurants.forEach(r => {
  const ratingHtml = r.rating != null ? `<span class="popup-rating">${starDisplay(r.rating)}</span>` : '';
  const noteHtml = r.note ? `<div class="popup-note">${escapeHtml(r.note)}</div>` : '';
  const pst = getStatus(r);

  const popup = `<div class="popup-inner">
    <div class="popup-name">${escapeHtml(r.name)}</div>
    <div class="popup-cuisine">${escapeHtml(r.cuisine)} &middot; ${escapeHtml(r.neighborhood)}</div>
    <div class="popup-address">${escapeHtml(r.address)}</div>
    <div class="popup-meta">${ratingHtml}<span class="status-badge status-${pst.cls}">${pst.label}</span><span>${escapeHtml(formatSource(r.source))}</span></div>
    ${noteHtml}
    <a class="gmaps-btn" href="${gmapsUrl(r)}" target="_blank" rel="noopener">Open in Google Maps</a>
  </div>`;

  const marker = L.marker([r.lat, r.lng], { icon: pinIcon })
    .bindPopup(popup, { maxWidth: 280 })
    .addTo(map);
  markers[r.name + r.address] = marker;
});

// --- FILTERS ---
const neighborhoods = [...new Set(restaurants.map(r => r.neighborhood))].sort();
const filterBar = document.getElementById('filters');
let activeFilter = 'all';

function createFilterBtn(label, value) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.filter = value;
  btn.addEventListener('click', () => {
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = value;
    applyFilters();
  });
  filterBar.appendChild(btn);
}

createFilterBtn('All', 'all');
neighborhoods.forEach(n => createFilterBtn(n, n));

// --- CUISINE FILTERS ---
const cuisineFilterBar = document.getElementById('cuisine-filters');
let activeCuisineFilter = 'all';
const catCounts = {};
restaurants.forEach(r => { catCounts[r.cuisineCat] = (catCounts[r.cuisineCat] || 0) + 1; });
const cuisineCategories = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);

function createCuisineBtn(label, value) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.filter = value;
  btn.addEventListener('click', () => {
    cuisineFilterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCuisineFilter = value;
    applyFilters();
  });
  cuisineFilterBar.appendChild(btn);
}

createCuisineBtn('All', 'all');
cuisineCategories.forEach(cat => createCuisineBtn(cat, cat));

// --- SEARCH ---
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => applyFilters());

// --- CLEAR FILTERS ---
const clearBar = document.getElementById('clear-bar');
const clearBtn = document.getElementById('clear-btn');

function updateClearButton() {
  const hasFilters = activeFilter !== 'all' || activeCuisineFilter !== 'all' || searchInput.value.trim() !== '';
  clearBar.classList.toggle('visible', hasFilters);
}

clearBtn.addEventListener('click', () => {
  activeFilter = 'all';
  activeCuisineFilter = 'all';
  searchInput.value = '';
  filterBar.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  cuisineFilterBar.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  applyFilters();
});

function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  let filtered = activeFilter === 'all' ? restaurants : restaurants.filter(r => r.neighborhood === activeFilter);
  if (activeCuisineFilter !== 'all') {
    filtered = filtered.filter(r => r.cuisineCat === activeCuisineFilter);
  }
  if (query) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(query) ||
      (r.cuisine && r.cuisine.toLowerCase().includes(query)) ||
      r.neighborhood.toLowerCase().includes(query) ||
      (r.note && r.note.toLowerCase().includes(query))
    );
  }
  renderList(filtered, activeFilter, query);
  updateClearButton();
}

// --- LIST ---
const listEl = document.getElementById('list');
const listHeader = document.getElementById('list-header');
const countEl = document.getElementById('count');

function renderList(filtered, filter, query) {

  let label = 'All Restaurants';
  if (filter !== 'all' && activeCuisineFilter !== 'all') {
    label = activeCuisineFilter + ' in ' + filter;
  } else if (filter !== 'all') {
    label = filter;
  } else if (activeCuisineFilter !== 'all') {
    label = activeCuisineFilter;
  }
  listHeader.textContent = `${label} (${filtered.length})`;

  countEl.textContent = `${restaurants.length} spots across NYC`;

  // Show/hide markers
  const visibleKeys = new Set(filtered.map(r => r.name + r.address));
  Object.entries(markers).forEach(([key, marker]) => {
    if (visibleKeys.has(key)) { marker.addTo(map); }
    else { marker.remove(); }
  });

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="empty-state-title">No restaurants found</div>
      <div>Try adjusting your search or filters</div>
    </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const st = getStatus(r);
    return `
    <div class="restaurant-card" data-key="${r.name}${r.address}">
      <div class="card-top">
        <div class="card-name">${escapeHtml(r.name)}</div>
        ${r.rating != null ? `<div class="card-rating">${starDisplay(r.rating)}</div>` : ''}
      </div>
      <div class="card-details">
        <span class="status-badge status-${st.cls}">${st.label}</span>
        <span class="card-neighborhood">${escapeHtml(r.neighborhood)}</span>
        <span class="card-cuisine">${escapeHtml(r.cuisine)}</span>
      </div>
      <div class="card-details">${escapeHtml(r.address)}</div>
      ${r.note ? `<div class="card-note">${escapeHtml(r.note)}</div>` : ''}
      <div class="card-bottom">
        <span class="card-source">${escapeHtml(formatSource(r.source))}</span>
        <a class="card-gmaps" href="${gmapsUrl(r)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Google Maps</a>
      </div>
    </div>`;
  }).join('');

  // Card click -> fly to pin and open popup
  listEl.querySelectorAll('.restaurant-card').forEach(card => {
    card.addEventListener('click', () => {
      const key = card.dataset.key;
      const marker = markers[key];
      if (marker) {
        map.flyTo(marker.getLatLng(), 16, { duration: 0.8 });
        marker.openPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  });
}

// Initialize the application after data is loaded
function initializeApp() {
  // --- MAP ---
  const bounds = L.latLngBounds(restaurants.map(r => [r.lat, r.lng]));
  const map = L.map('map', { zoomControl: true }).fitBounds(bounds, { padding: [30, 30] });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  const pinIcon = L.divIcon({
    className: '',
    html: '<div style="width:28px;height:28px;background:#f0a030;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:14px;">&#127860;</div>',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16]
  });

  const markers = {};
  restaurants.forEach(r => {
    const ratingHtml = r.rating != null ? `<span class="popup-rating">${starDisplay(r.rating)}</span>` : '';
    const noteHtml = r.note ? `<div class="popup-note">${escapeHtml(r.note)}</div>` : '';
    const pst = getStatus(r);

    const popup = `<div class="popup-inner">
      <div class="popup-name">${escapeHtml(r.name)}</div>
      <div class="popup-cuisine">${escapeHtml(r.cuisine)} &middot; ${escapeHtml(r.neighborhood)}</div>
      <div class="popup-address">${escapeHtml(r.address)}</div>
      <div class="popup-meta">${ratingHtml}<span class="status-badge status-${pst.cls}">${pst.label}</span><span>${escapeHtml(formatSource(r.source))}</span></div>
      ${noteHtml}
      <a class="gmaps-btn" href="${gmapsUrl(r)}" target="_blank" rel="noopener">Open in Google Maps</a>
    </div>`;

    const marker = L.marker([r.lat, r.lng], { icon: pinIcon })
      .bindPopup(popup, { maxWidth: 280 })
      .addTo(map);
    markers[r.name + r.address] = marker;
  });

  // --- FILTERS ---
  const neighborhoods = [...new Set(restaurants.map(r => r.neighborhood))].sort();
  const filterBar = document.getElementById('filters');
  let activeFilter = 'all';

  function createFilterBtn(label, value) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
    btn.textContent = label;
    btn.dataset.filter = value;
    btn.addEventListener('click', () => {
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = value;
      applyFilters(map, markers);
    });
    filterBar.appendChild(btn);
  }

  createFilterBtn('All', 'all');
  neighborhoods.forEach(n => createFilterBtn(n, n));

  // --- CUISINE FILTERS ---
  const cuisineFilterBar = document.getElementById('cuisine-filters');
  let activeCuisineFilter = 'all';
  const catCounts = {};
  restaurants.forEach(r => { catCounts[r.cuisineCat] = (catCounts[r.cuisineCat] || 0) + 1; });
  const cuisineCategories = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);

  function createCuisineBtn(label, value) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
    btn.textContent = label;
    btn.dataset.filter = value;
    btn.addEventListener('click', () => {
      cuisineFilterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCuisineFilter = value;
      applyFilters(map, markers);
    });
    cuisineFilterBar.appendChild(btn);
  }

  createCuisineBtn('All', 'all');
  cuisineCategories.forEach(cat => createCuisineBtn(cat, cat));

  // --- SEARCH ---
  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', () => applyFilters(map, markers));

  // --- CLEAR FILTERS ---
  const clearBar = document.getElementById('clear-bar');
  const clearBtn = document.getElementById('clear-btn');

  function updateClearButton() {
    const hasFilters = activeFilter !== 'all' || activeCuisineFilter !== 'all' || searchInput.value.trim() !== '';
    clearBar.classList.toggle('visible', hasFilters);
  }

  clearBtn.addEventListener('click', () => {
    activeFilter = 'all';
    activeCuisineFilter = 'all';
    searchInput.value = '';
    filterBar.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === 'all');
    });
    cuisineFilterBar.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === 'all');
    });
    applyFilters(map, markers);
  });

  applyFilters(map, markers);
}

function applyFilters(map, markers) {
  const searchInput = document.getElementById('search');
  const query = searchInput.value.trim().toLowerCase();
  let filtered = activeFilter === 'all' ? restaurants : restaurants.filter(r => r.neighborhood === activeFilter);
  if (activeCuisineFilter !== 'all') {
    filtered = filtered.filter(r => r.cuisineCat === activeCuisineFilter);
  }
  if (query) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(query) ||
      (r.cuisine && r.cuisine.toLowerCase().includes(query)) ||
      r.neighborhood.toLowerCase().includes(query) ||
      (r.note && r.note.toLowerCase().includes(query))
    );
  }
  renderList(filtered, map, markers);
  updateClearButton();
}

// --- LIST ---
const listEl = document.getElementById('list');
const listHeader = document.getElementById('list-header');
const countEl = document.getElementById('count');

function renderList(filtered, map, markers) {
  let label = 'All Restaurants';
  if (activeFilter !== 'all' && activeCuisineFilter !== 'all') {
    label = activeCuisineFilter + ' in ' + activeFilter;
  } else if (activeFilter !== 'all') {
    label = activeFilter;
  } else if (activeCuisineFilter !== 'all') {
    label = activeCuisineFilter;
  }
  listHeader.textContent = `${label} (${filtered.length})`;

  countEl.textContent = `${restaurants.length} spots across NYC`;

  // Show/hide markers
  const visibleKeys = new Set(filtered.map(r => r.name + r.address));
  Object.entries(markers).forEach(([key, marker]) => {
    if (visibleKeys.has(key)) { marker.addTo(map); }
    else { marker.remove(); }
  });

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="empty-state-title">No restaurants found</div>
      <div>Try adjusting your search or filters</div>
    </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const st = getStatus(r);
    return `
    <div class="restaurant-card" data-key="${r.name}${r.address}">
      <div class="card-top">
        <div class="card-name">${escapeHtml(r.name)}</div>
        ${r.rating != null ? `<div class="card-rating">${starDisplay(r.rating)}</div>` : ''}
      </div>
      <div class="card-details">
        <span class="status-badge status-${st.cls}">${st.label}</span>
        <span class="card-neighborhood">${escapeHtml(r.neighborhood)}</span>
        <span class="card-cuisine">${escapeHtml(r.cuisine)}</span>
      </div>
      <div class="card-details">${escapeHtml(r.address)}</div>
      ${r.note ? `<div class="card-note">${escapeHtml(r.note)}</div>` : ''}
      <div class="card-bottom">
        <span class="card-source">${escapeHtml(formatSource(r.source))}</span>
        <a class="card-gmaps" href="${gmapsUrl(r)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Google Maps</a>
      </div>
    </div>`;
  }).join('');

  // Card click -> fly to pin and open popup
  listEl.querySelectorAll('.restaurant-card').forEach(card => {
    card.addEventListener('click', () => {
      const key = card.dataset.key;
      const marker = markers[key];
      if (marker) {
        map.flyTo(marker.getLatLng(), 16, { duration: 0.8 });
        marker.openPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  });
}
</script>
</body>
