function addedScore(d) {
  if (!d) return 0;
  if (d.length === 10) return Date.parse(d);
  if (d.length === 7) return Date.parse(d + '-01');
  return 0;
}

function cuisineCategory(cuisine) {
  const c = (cuisine || '').toLowerCase();
  // Specific Asian cuisines come first so compound names like
  // "Korean Steakhouse", "Korean-Italian", "Vietnamese-Mexican Fusion",
  // and "French-Vietnamese" don't get swallowed by broader categories below.
  if (c.includes('vietnamese')) return 'Vietnamese';
  if (c.includes('korean')) return 'Korean';
  if (c.includes('mexican')) return 'Mexican';
  if (c.includes('chinese')) return 'Chinese';
  if (c.includes('french') || c.includes('bistro')) return 'French';
  if (c.includes('indian')) return 'Indian';
  if (c.includes('coffee') || c.includes('ice cream') || c.includes('frozen yogurt') || c.includes('acai') || c.includes('smoothie') || c.includes('gelato') || c.includes('dessert')) return 'Coffee & Sweets';
  if (c.includes('american') || c === 'steakhouse' || c.includes('burgers') || c.includes('southern') || c.includes('sandwich')) return 'American';
  if (c.includes('mediterranean') || c.includes('israeli') || c.includes('persian') || c.includes('greek') || c.includes('falafel')) return 'Mediterranean';
  if (c.includes('seafood') || c.includes('oyster')) return 'Seafood';
  if (c.includes('japanese') || c === 'nikkei') return 'Japanese';
  if (c.includes('caribbean')) return 'Caribbean';
  if (c.includes('italian')) return 'Italian';
  if (c.includes('thai')) return 'Thai';
  if (c.includes('tibetan') || c.includes('malaysian') || c.includes('hong kong')) return 'Asian';
  if (c.includes('cafe') || c.includes('caf\u00e9') || c.includes('bar') || c.includes('wine')) return 'Cafe & Bar';
  if (c.includes('bakery')) return 'Bakery';
  if (c.includes('pizza')) return 'Pizza';
  return 'Other';
}

const seen = new Set();
const deduped = restaurants.filter(r => {
  const key = r.name + '|' + r.address;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

deduped.sort((a, b) => addedScore(b.added) - addedScore(a.added));
const normalizeQuotes = s => s.replace(/’/g, "'");
const HOURS_BY_NAME = Object.fromEntries(
  Object.entries(HOURS).map(([k, v]) => [normalizeQuotes(k), v])
);
deduped.forEach(r => { r.hours = HOURS_BY_NAME[normalizeQuotes(r.name)] ?? null; });
deduped.forEach(r => { r.cuisineCat = cuisineCategory(r.cuisine); });

function getStatus(r) {
  if (CLOSED.has(r.name)) return {label: 'Closed', cls: 'closed'};
  if (UPCOMING.has(r.name)) return {label: 'Coming Soon', cls: 'upcoming'};
  if (TEMPORARY.has(r.name)) return {label: 'Pop-Up', cls: 'temporary'};
  return null;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function gmapsUrl(r) {
  if (r.lat == null || r.lng == null) return '#';
  const base = `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
  return r.place_id ? base + `&query_place_id=${r.place_id}` : base;
}

function formatAdded(d) {
  if (!d) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = d.split('-');
  const month = months[parseInt(parts[1], 10) - 1];
  if (parts[2]) return 'Added ' + month + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
  return 'Added ' + month + ' ' + parts[0];
}

const listEl = document.getElementById('list');
const listHeader = document.getElementById('list-header');
const countEl = document.getElementById('count');
const filterBar = document.getElementById('filters');
const cuisineFilterBar = document.getElementById('cuisine-filters');
const searchInput = document.getElementById('search');
const clearBar = document.getElementById('clear-bar');
const clearBtn = document.getElementById('clear-btn');
const searchClear = document.getElementById('search-clear');

let activeFilter = 'all';
let activeCuisineFilter = 'all';
let activeSort = 'date';
let prevVisibleKey = '';
let isInitialRender = true;

const mappable = deduped.filter(r => r.lat != null && r.lng != null);
const bounds = L.latLngBounds(mappable.map(r => [r.lat, r.lng]));
const map = L.map('map', { zoomControl: true }).fitBounds(bounds, { padding: [30, 30] });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const pinIcon = L.divIcon({
  className: '',
  html: '<div style="width:28px;height:28px;background:#f0a030;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:14px;">&#127860;</div>',
  iconSize: [28, 28],
  iconAnchor: [14, 14],
  popupAnchor: [0, -16]
});

const markers = {};
mappable.forEach(r => {
  const noteHtml = r.note ? `<div class="popup-note">${escapeHtml(r.note)}</div>` : '';
  const hoursHtml = r.hours ? `<div class="popup-hours">${escapeHtml(r.hours)}</div>` : '';
  const pst = getStatus(r);
  const statusHtml = pst ? `<span class="status-badge status-${pst.cls}">${pst.label}</span>` : '';

  const popup = `<div class="popup-inner">
    <div class="popup-name">${escapeHtml(r.name)}</div>
    <div class="popup-cuisine">${escapeHtml(r.cuisine)} &middot; ${escapeHtml(r.neighborhood)}</div>
    <div class="popup-address">${escapeHtml(r.address)}</div>
    ${hoursHtml}
    <div class="popup-meta">${statusHtml}<span>${escapeHtml(r.source)}</span>${r.added ? `<span>${formatAdded(r.added)}</span>` : ''}</div>
    ${noteHtml}
    <a class="gmaps-btn" href="${gmapsUrl(r)}" target="_blank" rel="noopener">Open in Google Maps</a>
  </div>`;

  const marker = L.marker([r.lat, r.lng], { icon: pinIcon })
    .bindPopup(popup, { maxWidth: 280 })
    .addTo(map);
  markers[r.name + r.address] = marker;
});

const neighborhoods = [...new Set(deduped.map(r => r.neighborhood))].sort();
const neighborhoodCounts = {};
deduped.forEach(r => { neighborhoodCounts[r.neighborhood] = (neighborhoodCounts[r.neighborhood] || 0) + 1; });

function createFilterBtn(label, value) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.filter = value;
  btn.addEventListener('click', () => {
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = value;
    applyFilters();
  });
  filterBar.appendChild(btn);
}

createFilterBtn('All (' + deduped.length + ')', 'all');
neighborhoods.forEach(n => createFilterBtn(n + ' (' + neighborhoodCounts[n] + ')', n));

const catCounts = {};
deduped.forEach(r => { catCounts[r.cuisineCat] = (catCounts[r.cuisineCat] || 0) + 1; });
const cuisineCategories = Object.keys(catCounts).sort((a, b) => catCounts[b] - catCounts[a]);

function createCuisineBtn(label, value) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (value === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.dataset.filter = value;
  btn.addEventListener('click', () => {
    cuisineFilterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCuisineFilter = value;
    applyFilters();
  });
  cuisineFilterBar.appendChild(btn);
}

createCuisineBtn('All', 'all');
cuisineCategories.forEach(cat => createCuisineBtn(cat, cat));

let searchDebounce;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => applyFilters(), 200);
  searchClear.classList.toggle('visible', searchInput.value.length > 0);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  applyFilters();
  searchInput.focus();
});

clearBtn.addEventListener('click', () => {
  activeFilter = 'all';
  activeCuisineFilter = 'all';
  searchInput.value = '';
  searchClear.classList.remove('visible');
  filterBar.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  cuisineFilterBar.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  applyFilters();
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSort = btn.dataset.sort;
    applyFilters();
  });
});

function sortList(list) {
  const sorted = list.slice();
  switch (activeSort) {
    case 'alpha':
      sorted.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'neighborhood':
      sorted.sort((a, b) => a.neighborhood.localeCompare(b.neighborhood) || a.name.localeCompare(b.name));
      break;
    default:
      sorted.sort((a, b) => addedScore(b.added) - addedScore(a.added));
  }
  return sorted;
}

function renderList(filtered) {
  let label = 'All Restaurants';
  if (activeFilter !== 'all' && activeCuisineFilter !== 'all') {
    label = activeCuisineFilter + ' in ' + activeFilter;
  } else if (activeFilter !== 'all') {
    label = activeFilter;
  } else if (activeCuisineFilter !== 'all') {
    label = activeCuisineFilter;
  }
  listHeader.textContent = `${label} (${filtered.length})`;
  countEl.textContent = `${deduped.length} spots across NYC`;

  const visibleKeys = new Set(filtered.filter(r => r.lat != null).map(r => r.name + r.address));
  Object.entries(markers).forEach(([key, marker]) => {
    if (visibleKeys.has(key)) { marker.addTo(map); }
    else { marker.remove(); }
  });

  const visibleCoords = filtered.filter(r => r.lat != null && r.lng != null);
  const visibleKey = visibleCoords.map(r => r.name).join('|');
  if (visibleKey !== prevVisibleKey && !isInitialRender) {
    if (visibleCoords.length === 1) {
      map.flyTo([visibleCoords[0].lat, visibleCoords[0].lng], 16, { duration: 0.6 });
    } else if (visibleCoords.length > 1) {
      map.flyToBounds(L.latLngBounds(visibleCoords.map(r => [r.lat, r.lng])), { padding: [30, 30], maxZoom: 16, duration: 0.6 });
    }
  }
  prevVisibleKey = visibleKey;
  isInitialRender = false;

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state">
      <div class="empty-state-title">No restaurants found</div>
      <div>Try adjusting your search or filters</div>
    </div>`;
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const st = getStatus(r);
    const stHtml = st ? `<span class="status-badge status-${st.cls}">${st.label}</span>` : '';
    const hasCoords = r.lat != null && r.lng != null;
    return `
    <div class="restaurant-card${hasCoords ? '' : ' card-unmappable'}" data-key="${escapeHtml(r.name)}${escapeHtml(r.address || '')}">
      <div class="card-top">
        <div class="card-name">${escapeHtml(r.name)}</div>
      </div>
      <div class="card-details">
        ${stHtml}
        <span class="card-neighborhood">${escapeHtml(r.neighborhood)}</span>
        <span class="card-cuisine">${escapeHtml(r.cuisine)}</span>
      </div>
      <div class="card-details">${r.address ? escapeHtml(r.address) : '<span class="card-address-tbd">Address TBD</span>'}</div>
      ${r.hours ? `<div class="card-hours">${escapeHtml(r.hours)}</div>` : ''}
      ${r.note ? `<div class="card-note">${escapeHtml(r.note)}</div>` : ''}
      <div class="card-bottom">
        <span class="card-source">${escapeHtml(r.source)}${r.added ? ' \u00b7 ' + formatAdded(r.added) : ''}</span>
        ${hasCoords ? `<a class="card-gmaps" href="${gmapsUrl(r)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Google Maps</a>` : ''}
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.restaurant-card').forEach(card => {
    card.addEventListener('click', () => {
      const key = card.dataset.key;
      const marker = markers[key];
      if (marker) {
        map.flyTo(marker.getLatLng(), 16, { duration: 0.8 });
        marker.openPopup();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  });
}

function updateClearButton() {
  const hasFilters = activeFilter !== 'all' || activeCuisineFilter !== 'all' || searchInput.value.trim() !== '';
  clearBar.classList.toggle('visible', hasFilters);
}

function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  let filtered = activeFilter === 'all' ? deduped : deduped.filter(r => r.neighborhood === activeFilter);
  if (activeCuisineFilter !== 'all') {
    filtered = filtered.filter(r => r.cuisineCat === activeCuisineFilter);
  }
  if (query) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(query) ||
      (r.cuisine && r.cuisine.toLowerCase().includes(query)) ||
      r.neighborhood.toLowerCase().includes(query) ||
      (r.note && r.note.toLowerCase().includes(query)) ||
      (r.address && r.address.toLowerCase().includes(query))
    );
  }
  renderList(sortList(filtered));
  updateClearButton();
}

applyFilters();
</script>
</body>
</html>
